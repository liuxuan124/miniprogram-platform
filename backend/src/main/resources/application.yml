server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: mini-program-platform
  profiles:
    active: dev
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null
  main:
    allow-bean-definition-overriding: true

# MyBatis-Plus
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.miniprogram.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT
jwt:
  secret: miniprogram-platform-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256
  expiration: 86400000
  refresh-expiration: 604800000

# Swagger / OpenAPI
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
  packages-to-scan: com.miniprogram.controller
  default-flat-param-object: true

# 微信小程序配置
wx:
  miniapp:
    appid: ${WX_MINIAPP_APPID:your-appid}
    secret: ${WX_MINIAPP_SECRET:your-secret}
  pay:
    app-id: ${WX_PAY_APPID:your-appid}
    mch-id: ${WX_PAY_MCHID:your-mchid}
    cert-serial-no: ${WX_PAY_CERT_SERIAL_NO:your-cert-serial-no}
    private-key: ${WX_PAY_PRIVATE_KEY:}
    api-v3-key: ${WX_PAY_API_V3_KEY:your-api-v3-key}
    notify-url: ${WX_PAY_NOTIFY_URL:https://your-domain.com/api/v1/mp/payments/wx-notify}

# 小程序代码推送
miniapp:
  project-root: ${MINIAPP_PROJECT_ROOT:}
  node-command: ${MINIAPP_NODE_COMMAND:node}

# 日志
logging:
  level:
    root: INFO
    com.miniprogram: DEBUG
    com.baomidou.mybatisplus: DEBUG
