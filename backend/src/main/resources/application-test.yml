# 测试环境配置
spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://mysql-test:3306/miniprogram_test?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: miniprogram
    password: ${DB_PASSWORD:miniprogram_test}
    hikari:
      minimum-idle: 5
      maximum-pool-size: 30
      idle-timeout: 30000
      max-lifetime: 1800000
      connection-timeout: 30000
      pool-name: MiniProgramHikariCP

  data:
    redis:
      host: redis-test
      port: 6379
      password: ${REDIS_PASSWORD:}
      database: 1
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 30
          max-idle: 15
          min-idle: 5
          max-wait: 3000ms

logging:
  level:
    com.miniprogram: INFO
