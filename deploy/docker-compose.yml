# ============================================================================
# 微信小程序多场景搭建与运营系统 — Docker Compose 编排
# ============================================================================
# 用法:
#   docker compose up -d              # 启动所有服务
#   docker compose up -d backend      # 仅启动后端
#   docker compose logs -f backend    # 查看日志
#   docker compose down               # 停止并删除容器
# ============================================================================

version: "3.8"

services:
  # ── MySQL 8.0 ──────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: miniapp-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123456}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-miniapp}
      MYSQL_USER: ${MYSQL_USER:-miniapp}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-miniapp123456}
      TZ: Asia/Shanghai
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init-db:/docker-entrypoint-initdb.d
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --max-connections=500
      --innodb-buffer-pool-size=256M
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root123456}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - miniapp-net

  # ── Redis 7 Alpine ────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: miniapp-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-redis123456}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis123456}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - miniapp-net

  # ── Spring Boot 后端 ──────────────────────────────────────────────────
  backend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.backend
    container_name: miniapp-backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-miniapp}?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-miniapp}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-miniapp123456}
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_REDIS_PASSWORD: ${REDIS_PASSWORD:-redis123456}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
      WX_MINIAPP_APPID: ${WX_MINIAPP_APPID:-}
      WX_MINIAPP_SECRET: ${WX_MINIAPP_SECRET:-}
      WX_PAY_APPID: ${WX_PAY_APPID:-}
      WX_PAY_MCHID: ${WX_PAY_MCHID:-}
      WX_PAY_CERT_SERIAL_NO: ${WX_PAY_CERT_SERIAL_NO:-}
      WX_PAY_PRIVATE_KEY: ${WX_PAY_PRIVATE_KEY:-}
      WX_PAY_API_V3_KEY: ${WX_PAY_API_V3_KEY:-}
      WX_PAY_NOTIFY_URL: ${WX_PAY_NOTIFY_URL:-https://api.zfculture.site/api/v1/mp/payments/wx-notify}
      XUNFEI_APP_ID: ${XUNFEI_APP_ID:-}
      XUNFEI_API_KEY: ${XUNFEI_API_KEY:-}
      XUNFEI_API_SECRET: ${XUNFEI_API_SECRET:-}
      UPLOAD_PATH: ${UPLOAD_PATH:-/app/uploads}
      JAVA_OPTS: ${JAVA_OPTS:--Xms256m -Xmx512m}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      - upload_data:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - miniapp-net

  # ── Vue 前端 (Nginx 托管) ────────────────────────────────────────────
  admin:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.admin
    container_name: miniapp-admin
    restart: unless-stopped
    ports:
      - "${ADMIN_PORT:-80}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:80/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - miniapp-net

  # ── Prometheus 监控 ──────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: miniapp-prometheus
    restart: unless-stopped
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
    networks:
      - miniapp-net

  # ── Grafana 可视化 ──────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: miniapp-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin123456}
      GF_INSTALL_PLUGINS: ""
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - miniapp-net

# ── 网络 ──────────────────────────────────────────────────────────────────
networks:
  miniapp-net:
    driver: bridge
    name: miniapp-network

# ── 数据卷 ────────────────────────────────────────────────────────────────
volumes:
  mysql_data:
    name: miniapp-mysql-data
  redis_data:
    name: miniapp-redis-data
  upload_data:
    name: miniapp-upload-data
  prometheus_data:
    name: miniapp-prometheus-data
  grafana_data:
    name: miniapp-grafana-data
