# ============================================================================
# 微信小程序多场景搭建与运营系统 — Locust 配置文件
# ============================================================================
# 文档: https://docs.locust.io/en/stable/configuration.html

# ── 基本设置 ──────────────────────────────────────────────────────────────
locustfile = locustfile.py
host = http://localhost:8080

# ── 用户设置 ──────────────────────────────────────────────────────────────
users = 50
spawn-rate = 10
run-time = 5m

# ── Web UI 设置 ──────────────────────────────────────────────────────────
web-host = 0.0.0.0
web-port = 8089

# ── 输出设置 ──────────────────────────────────────────────────────────────
csv = performance_report
html = performance_report.html

# ── 日志设置 ──────────────────────────────────────────────────────────────
loglevel = INFO
logfile = locust.log

# ── 超时设置 ──────────────────────────────────────────────────────────────
timeout = 30

# ── 其他设置 ──────────────────────────────────────────────────────────────
stop-timeout = 60
