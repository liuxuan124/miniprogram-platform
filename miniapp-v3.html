<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>微信小程序多场景搭建与运营系统 · 产品原型</title>
<style>
:root{
  --bg:#f0f2f7;--sidebar:#0f1623;--sidebar-active:#1769ff;--sidebar-text:#8fa3c0;
  --top:#fff;--card:#fff;--border:#e4e9f2;--text:#0d1b2e;--muted:#6b7b93;
  --blue:#1769ff;--blue-light:#eaf1ff;--green:#0faa6e;--green-light:#e8faf3;
  --orange:#f59e0b;--orange-light:#fff8e6;--red:#ef4444;--red-light:#fff0f0;
  --purple:#7c3aed;--purple-light:#f3eeff;--cyan:#06b6d4;--silver:#94a3b8;--silver-light:#f1f5f9;
  --shadow:0 2px 12px rgba(15,22,40,.07);--shadow-lg:0 8px 32px rgba(15,22,40,.13);
  --radius:14px;--phone-w:334px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"PingFang SC","Microsoft YaHei",Arial,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;overflow:hidden;font-size:14px}
#appRoot{display:flex;height:100vh;overflow:hidden}
.sidebar{width:220px;min-width:220px;background:var(--sidebar);display:flex;flex-direction:column;overflow:hidden}
.sb-head{padding:18px 16px 14px;border-bottom:1px solid rgba(255,255,255,.06)}
.sb-logo{width:40px;height:40px;border-radius:13px;background:linear-gradient(135deg,#1769ff,#20b7ff);display:flex;align-items:center;justify-content:center;font-size:20px;margin-bottom:10px}
.sb-name{font-size:14px;font-weight:700;color:#fff}
.sb-sub{font-size:11px;color:var(--sidebar-text);margin-top:2px}
.sb-body{flex:1;overflow-y:auto;padding:8px 8px 20px}
.sb-body::-webkit-scrollbar{width:0}
.nav-group{font-size:10px;color:#3d5270;text-transform:uppercase;letter-spacing:.09em;padding:14px 10px 5px;font-weight:700}
.nav-item{display:flex;align-items:center;gap:8px;padding:9px 11px;border-radius:10px;color:var(--sidebar-text);cursor:pointer;font-size:13px;transition:.15s;margin:1px 0}
.nav-item:hover{background:rgba(255,255,255,.08);color:#e2eaf6}
.nav-item.active{background:var(--sidebar-active);color:#fff;font-weight:600}
.nav-item .ni{font-size:15px;width:18px;text-align:center;flex-shrink:0}
.nb{margin-left:auto;background:#ef4444;color:#fff;font-size:10px;padding:1px 6px;border-radius:99px;font-weight:700}
.nb.o{background:#f59e0b}
.main-area{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:54px;background:var(--top);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 22px;flex-shrink:0}
.breadcrumb{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--muted)}
.breadcrumb .cur{color:var(--text);font-weight:600}
.topbar-r{display:flex;align-items:center;gap:10px}
.mode-sw{display:flex;background:#f0f2f7;border-radius:99px;padding:4px;gap:2px}
.mbtn{padding:6px 16px;font-size:12px;font-weight:600;cursor:pointer;background:transparent;color:var(--muted);border:none;border-radius:99px;transition:.2s;font-family:inherit}
.mbtn.active{background:#fff;color:var(--blue);box-shadow:0 2px 8px rgba(0,0,0,.08)}
.ava{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#1769ff,#20b7ff);display:flex;align-items:center;justify-content:center;font-size:15px;cursor:pointer}
.content-area{flex:1;overflow-y:auto;padding:22px 24px 40px}
.content-area::-webkit-scrollbar{width:5px}
.content-area::-webkit-scrollbar-thumb{background:#d0d8e8;border-radius:99px}
/* Cards / Layout */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow)}
.cp{padding:20px}
.g{display:grid;gap:16px}
.g2{grid-template-columns:repeat(2,1fr)}.g3{grid-template-columns:repeat(3,1fr)}.g4{grid-template-columns:repeat(4,1fr)}
.flex{display:flex}.gap8{gap:8px}.gap12{gap:12px}.mla{margin-left:auto}.mt16{margin-top:16px}.mb16{margin-bottom:16px}.mt12{margin-top:12px}
.sec-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.sec-hd h3{font-size:15px;font-weight:700}
.ph{margin-bottom:20px}
.pt{font-size:20px;font-weight:800;letter-spacing:-.02em;margin-bottom:3px}
.ps{color:var(--muted);font-size:13px}
/* Buttons */
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 14px;border-radius:10px;border:1px solid var(--border);background:#fff;color:var(--text);font-size:13px;cursor:pointer;transition:.15s;font-family:inherit;white-space:nowrap;line-height:1;font-weight:600}
.btn:hover{border-color:#bbc8da;background:#f5f8ff;transform:translateY(-1px)}
.btn-p{background:var(--blue);color:#fff;border-color:var(--blue)}.btn-p:hover{background:#1057d4;color:#fff}
.btn-s{background:var(--green);color:#fff;border-color:var(--green)}
.btn-o{background:var(--orange);color:#fff;border-color:var(--orange)}
.btn-d{color:var(--red);border-color:#fca5a5;background:#fff5f5}
.sm{padding:5px 11px;font-size:12px;border-radius:8px}.xs{padding:4px 10px;font-size:11px;border-radius:7px}
/* Badges */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:99px;font-size:11px;font-weight:700}
.badge::before{content:"";width:5px;height:5px;border-radius:50%;background:currentColor;flex-shrink:0}
.bg{background:var(--green-light);color:#067647}.bo{background:var(--orange-light);color:#92400e}
.bb{background:#f1f4fa;color:var(--muted)}.bbl{background:var(--blue-light);color:var(--blue)}
.br{background:var(--red-light);color:#991b1b}.bp{background:var(--purple-light);color:var(--purple)}
.bsi{background:var(--silver-light);color:var(--silver)}
.nb0::before{display:none}
/* Tags */
.tag{display:inline-block;padding:2px 8px;border-radius:99px;font-size:11px;background:var(--blue-light);color:var(--blue)}
.tg{background:#f1f4fa;color:var(--muted)}.tp{background:var(--purple-light);color:var(--purple)}.to{background:var(--orange-light);color:#92400e}
/* Table */
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:10px 14px;color:var(--muted);font-weight:600;background:#f8faff;border-bottom:2px solid var(--border);white-space:nowrap}
td{padding:11px 14px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tbody tr:hover{background:#f8faff}
/* Form */
.inp,.sel,.ta{border:1px solid var(--border);border-radius:8px;padding:7px 11px;font-size:13px;color:var(--text);background:#fff;font-family:inherit;transition:.15s;outline:none}
.inp:focus,.sel:focus,.ta:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(23,105,255,.1)}
.inp{height:36px}.sel{height:36px;cursor:pointer}.ta{min-height:80px;resize:vertical}
.fr{display:grid;grid-template-columns:88px 1fr;gap:8px;align-items:center;margin-bottom:12px}
.fl{color:var(--muted);font-size:13px;text-align:right;padding-right:6px}
/* Stat card */
.sc{padding:18px 20px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);transition:.15s}
.sc:hover{box-shadow:var(--shadow-lg);transform:translateY(-1px)}
.sci{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:19px;margin-bottom:12px}
.scl{font-size:12px;color:var(--muted);font-weight:600;margin-bottom:6px}
.scv{font-size:26px;font-weight:800;letter-spacing:-.03em;line-height:1}
.scc{font-size:12px;margin-top:5px;color:var(--muted)}.sup{color:var(--green)}.sdn{color:var(--red)}
/* Bar chart */
.bc{display:flex;align-items:flex-end;gap:8px;height:120px;padding:0 4px}
.bcc{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1}
.bar{width:100%;border-radius:6px 6px 0 0;min-height:4px}
.brl{font-size:10px;color:var(--muted);white-space:nowrap}
.brv{font-size:10px;font-weight:700;color:var(--blue)}
/* Progress */
.prog{height:6px;background:#f0f2f7;border-radius:99px;overflow:hidden}
.progf{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--blue),var(--cyan));transition:width .6s}
/* Modal */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:.2s}
.mo.show{opacity:1;pointer-events:all}
.mb0{background:#fff;border-radius:18px;box-shadow:0 28px 70px rgba(0,0,0,.22);width:520px;max-width:94vw;max-height:86vh;overflow:auto;transform:translateY(12px);transition:.22s}
.mo.show .mb0{transform:none}
.mhd{padding:20px 22px 14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:#fff;z-index:2}
.mhd h3{font-size:16px;font-weight:700}
.mcl{cursor:pointer;color:var(--muted);font-size:22px;line-height:1;background:none;border:none;padding:0}
.mbd{padding:18px 22px}
.mft{padding:14px 22px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;background:#f8faff;border-radius:0 0 18px 18px}
/* Toast */
.toast{position:fixed;top:66px;right:22px;z-index:2000;display:flex;align-items:center;gap:10px;padding:11px 16px;border-radius:12px;background:#0d1b2e;color:#fff;font-size:13px;font-weight:500;box-shadow:var(--shadow-lg);transform:translateX(140%);transition:.3s;max-width:320px}
.toast.show{transform:translateX(0)}
/* Toolbar */
.toolbar{display:flex;align-items:center;gap:8px;padding:12px 0 14px;flex-wrap:wrap}
/* Rich editor */
.re{border:1px solid var(--border);border-radius:10px;overflow:hidden}
.ret{display:flex;gap:2px;padding:6px 8px;border-bottom:1px solid var(--border);background:#f8faff;flex-wrap:wrap}
.reb{width:28px;height:28px;border:1px solid transparent;border-radius:5px;background:none;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;color:var(--muted)}
.reb:hover{background:var(--blue-light);color:var(--blue)}
.rec{min-height:120px;padding:12px;font-size:13px;line-height:1.9;outline:none}
/* Page tabs */
.ptabs{display:flex;border-bottom:2px solid var(--border);margin-bottom:18px}
.ptab{padding:9px 16px;font-size:13px;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-2px;transition:.14s}
.ptab.active{color:var(--blue);border-bottom-color:var(--blue);font-weight:700}
/* Toggle switch */
.tog{width:38px;height:22px;border-radius:99px;background:#d0d8e8;cursor:pointer;position:relative;transition:.22s;flex-shrink:0;border:none}
.tog.on{background:var(--blue)}
.tog::after{content:"";position:absolute;top:3px;left:3px;width:16px;height:16px;border-radius:50%;background:#fff;box-shadow:0 1px 4px rgba(0,0,0,.2);transition:.22s}
.tog.on::after{left:19px}
/* Asset grid */
.agrid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
.ait{border-radius:10px;overflow:hidden;border:1.5px solid var(--border);cursor:pointer;transition:.14s;position:relative}
.ait:hover{border-color:var(--blue);transform:translateY(-2px)}
.ait.sel::after{content:"\2713";position:absolute;top:4px;right:4px;width:18px;height:18px;border-radius:50%;background:var(--blue);color:#fff;font-size:11px;display:flex;align-items:center;justify-content:center;font-weight:700}
.ath{height:70px;background:linear-gradient(135deg,#e0f2fe,#bfdbfe);display:flex;align-items:center;justify-content:center;font-size:26px}
.atn{padding:4px 6px;font-size:10px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;background:#f8faff}
/* Calendar */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-dl{text-align:center;font-size:10px;color:var(--muted);padding:4px 0;font-weight:600}
.cal-d{text-align:center;padding:7px 3px;border-radius:8px;font-size:12px;cursor:pointer;transition:.12s;position:relative}
.cal-d:hover{background:var(--blue-light);color:var(--blue)}
.cal-d.td{background:var(--blue);color:#fff;font-weight:700}
.cal-d.od{color:#ccc;cursor:default}.cal-d.od:hover{background:transparent;color:#ccc}
.cal-dot{position:absolute;bottom:2px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(--green)}
/* Time slots */
.tgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:8px}
.ts{padding:7px 4px;text-align:center;border:1px solid var(--border);border-radius:8px;font-size:12px;cursor:pointer;transition:.14s}
.ts:hover:not(.full){border-color:var(--blue);background:var(--blue-light);color:var(--blue)}
.ts.sel{background:var(--blue);color:#fff;border-color:var(--blue)}
.ts.full{background:#f8faff;color:#c0c9d8;cursor:not-allowed}
/* Coupon */
.cpn{border-radius:12px;overflow:hidden;display:flex;margin-bottom:10px;box-shadow:var(--shadow)}
.cpl{background:linear-gradient(135deg,var(--blue),#20b7ff);color:#fff;padding:14px 16px;display:flex;flex-direction:column;justify-content:center;align-items:center;min-width:90px}
.cpa{font-size:26px;font-weight:800;line-height:1}
.cpt{font-size:11px;opacity:.85;margin-top:3px}
.cpr{flex:1;background:#fff;border:1px solid var(--border);border-left:none;padding:12px 14px}
.cpn2{font-weight:700;font-size:13px;margin-bottom:3px}
.cprl{font-size:11px;color:var(--muted)}
/* Role card */
.rcard{background:#f8faff;border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px}
.rn{font-weight:700;font-size:13px;margin-bottom:3px;display:flex;align-items:center;gap:6px}
.rd{font-size:12px;color:var(--muted);margin-bottom:8px}
.rpc{display:flex;flex-wrap:wrap;gap:4px}
.rp{font-size:11px;padding:2px 7px;border-radius:99px;background:#fff;border:1px solid var(--border);color:var(--muted)}
/* Builder */
.builder{display:flex;height:calc(100vh - 54px);overflow:hidden;background:#eaedf5}
.bl{width:210px;min-width:210px;background:#fff;border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.bm{flex:1;display:flex;flex-direction:column;align-items:center;overflow-y:auto;padding:14px}
.brt{width:265px;min-width:265px;background:#fff;border-left:1px solid var(--border);overflow-y:auto}
.brt::-webkit-scrollbar{width:0}
.bph{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;padding:12px 14px 6px;border-bottom:1px solid var(--border)}
.cgrid{padding:8px;display:grid;grid-template-columns:1fr 1fr;gap:5px}
.cc{display:flex;flex-direction:column;align-items:center;gap:3px;padding:9px 5px;border-radius:9px;border:1px solid var(--border);background:#f8faff;cursor:pointer;font-size:11px;color:var(--muted);transition:.15s;text-align:center}
.cc:hover{border-color:var(--blue);background:var(--blue-light);color:var(--blue)}
.cc.active{border-color:var(--blue);background:var(--blue-light);color:var(--blue);font-weight:700}
.ci{font-size:19px}
.slist{padding:7px}
.sr{display:flex;align-items:center;gap:6px;padding:8px 9px;border-radius:8px;border:1px solid var(--border);margin-bottom:4px;font-size:12px;color:var(--muted);cursor:pointer;transition:.14s;background:#fff}
.sr:hover,.sr.active{border-color:var(--blue);color:var(--blue);background:var(--blue-light)}
.dh{color:#d0d8e4;font-size:13px}
.ps2{padding:12px 14px;border-bottom:1px solid var(--border)}
.ps2 h4{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
.pr{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.prl{font-size:12px;color:var(--muted);min-width:52px;flex-shrink:0}
.pi{flex:1;height:30px;border:1px solid var(--border);border-radius:6px;padding:0 8px;font-size:12px;font-family:inherit;outline:none}
.pi:focus{border-color:var(--blue)}
.pse{flex:1;height:30px;border:1px solid var(--border);border-radius:6px;padding:0 6px;font-size:12px;font-family:inherit;outline:none;background:#fff;cursor:pointer}
.sw2{display:flex;gap:5px;flex-wrap:wrap}
.sw{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:.12s}
.sw.active{border-color:var(--text);transform:scale(1.15)}
.btb{background:#fff;border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-shrink:0;position:sticky;top:0;z-index:10;width:100%}
.bpn{font-weight:800;font-size:14px}
.bver{font-size:11px;color:var(--muted);border:1px solid var(--border);padding:2px 7px;border-radius:6px;background:#f8faff}
/* Phone */
.phone{background:#fff;border-radius:36px;box-shadow:0 0 0 9px #111827,0 28px 60px rgba(0,0,0,.3);overflow:hidden}
.pn{height:26px;background:#111827;display:flex;align-items:center;justify-content:center}
.pp{width:76px;height:5px;background:#000;border-radius:99px;opacity:.55}
.ps3{overflow-y:auto;background:#f6f8fb;display:flex;flex-direction:column}
.ps3::-webkit-scrollbar{width:0}
/* Demo banner */
.db{background:linear-gradient(135deg,#0f2b5f,#1769ff 65%,#20b7ff);border-radius:16px;padding:18px 20px 16px;color:#fff;margin-bottom:18px;position:relative;overflow:hidden}
.db::after{content:"";position:absolute;right:-40px;top:-40px;width:150px;height:150px;border-radius:50%;background:rgba(255,255,255,.07)}
.dbt{font-size:14px;font-weight:700;margin-bottom:12px}
.dsr{display:flex;align-items:center;gap:0;overflow-x:auto;padding-bottom:2px}
.dsr::-webkit-scrollbar{height:0}
.ds{flex-shrink:0;padding:7px 11px;background:rgba(255,255,255,.12);border-radius:9px;font-size:12px;cursor:pointer;transition:.15s;white-space:nowrap}
.ds.done{background:rgba(255,255,255,.28)}.ds.cur{background:#fff;color:var(--blue);font-weight:700}
.darr{padding:0 4px;color:rgba(255,255,255,.4);font-size:14px;flex-shrink:0}
.dac{display:flex;gap:8px;margin-top:12px}
.dbtn{padding:7px 14px;border-radius:8px;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.25);color:#fff;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:.15s}
.dbtn:hover{background:rgba(255,255,255,.3)}.dbtn.p{background:#fff;color:var(--blue)}
/* MP UI */
.mp-top{height:44px;background:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;position:relative;border-bottom:1px solid var(--border);flex-shrink:0}
.mp-back{position:absolute;left:10px;color:var(--blue);font-size:22px;cursor:pointer;padding:4px;line-height:1}
.mp-body{flex:1;overflow-y:auto;padding-bottom:58px}
.mp-body::-webkit-scrollbar{width:0}
.mp-tabs{position:sticky;bottom:0;display:grid;height:58px;background:#fff;border-top:1px solid var(--border)}
.mp-ti{display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:10px;color:var(--muted);cursor:pointer;gap:2px;transition:.12s}
.mp-ti.active{color:var(--blue);font-weight:700}
.mp-tii{font-size:21px}
.mp-ban{height:155px;margin:10px;border-radius:14px;background:linear-gradient(135deg,#1769ff,#20b7ff);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;position:relative;overflow:hidden;cursor:pointer;flex-shrink:0}
.mp-dots{position:absolute;bottom:9px;left:50%;transform:translateX(-50%);display:flex;gap:4px}
.mp-dt{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.45)}
.mp-dt.on{background:#fff;width:14px;border-radius:99px}
.mp-nav{display:grid;gap:8px;margin:0 10px 10px;background:#fff;border-radius:14px;padding:12px 6px}
.mp-ni{text-align:center;cursor:pointer;transition:.12s}
.mp-ni:hover{opacity:.75}
.mp-nic{width:42px;height:42px;border-radius:13px;background:var(--blue-light);margin:0 auto 5px;display:flex;align-items:center;justify-content:center;font-size:20px}
.mp-nil{font-size:10px;color:var(--muted)}
.mp-card{background:#fff;border-radius:14px;margin:0 10px 10px;padding:12px;box-shadow:0 2px 8px rgba(0,0,0,.03)}
.mp-ct{font-weight:700;font-size:14px;margin-bottom:8px}
.mp-li{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.mp-li:last-child{border-bottom:none}
.mp-limg{width:58px;height:58px;border-radius:10px;background:linear-gradient(135deg,#e0f2fe,#bfdbfe);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:22px}
.mp-lb{flex:1;min-width:0}
.mp-lt{font-size:13px;font-weight:600;margin-bottom:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mp-ls{font-size:11px;color:var(--muted)}

function barChart(vals,labels){
  var max = Math.max.apply(null,vals);
  var h = '';
  for(var i=0;i<vals.length;i++){
    var v = vals[i];
    var ht = Math.max(8, v/max*92);

/* ========== BOOKING ========== */
function pgBooking(){
  var today=new Date();
  var yr=today.getFullYear(), mo=today.getMonth(), d=today.getDate();
  var fd=new Date(yr,mo,1);
  var off=fd.getDay();
  var calHtml='';
  var dlbls='日一二三四五六'.split('');
  for(var i=0;i<7;i++) calHtml+='<div class="cal-dl">'+dlbls[i]+'</div>';
  var dotDays=[3,5,8,12,15,19,22];
  for(var i=0;i<42;i++){
    var dd=new Date(yr,mo,1-off+i);
    var dn=dd.getDate();
    var isTd=dd.toDateString()===today.toDateString();
    var isOd=dd.getMonth()!==mo;
    var hasDot=dotDays.indexOf(dn)>=0&&!isOd;
    var cls='cal-d'+(isTd?' td':'')+(isOd?' od':'');
    var dotHtml=hasDot?'<div class="cal-dot"></div>':'';
    var onclick=isOd?'':('onclick="showToast(\'📅\',\'查看'+dn+'日预约\')"');

  var tsHtml='';

  for(var i=0;i<times.length;i++){

  }
  return '<div class="ph"><div class="pt">预约管理</div><div class="ps">服务项目、时间段配置、预约记录管理。</div></div>'+
  '<div class="g g2 mb16">'+

  '<div class="cal-grid">'+calHtml+'</div>'+

function updateProdFields(type){
  var sr=document.getElementById('stockRow');
  var hr=document.getElementById('shipRow');
  var dr=document.getElementById('digitalRow');
  var vr=document.getElementById('serviceRow');
  if(!sr)return;
  if(type==='digital'){sr.style.display='none';hr.style.display='none';dr.style.display='grid';vr.style.display='none';}

function updateProdFields(type){
  var sr=document.getElementById('stockRow');
  var hr=document.getElementById('shipRow');
  var dr=document.getElementById('digitalRow');
  var vr=document.getElementById('serviceRow');
  if(!sr)return;
  if(type==='digital'){sr.style.display='none';hr.style.display='none';dr.style.display='grid';vr.style.display='none';}
  else if(type==='service'){sr.style.display='none';hr.style.display='none';dr.style.display='none';vr.style.display='grid';}
  else{sr.style.display='grid';hr.style.display='grid';dr.style.display='none';vr.style.display='none';}
}
