version: 2
project: 微信小程序多场景搭建与运营系统
blockers:
  - id: BLK-ADMIN-BUILD-001
    source: admin npm run build
    severity: P0
    owner_agent: admin-agent
    status: resolved
    summary: 管理后台 TypeScript 构建失败，阻断后台交付和部署。
    evidence:
      - PaginatedResponse 未从 @/types/global 导出
      - 多处 noUnusedLocals / 类型不匹配
      - FormFieldType 被 import type 后作为运行时值使用
      - ConfigItem 缺少 label/type 字段
    resolution: 已修复 TypeScript 编译错误，npm run build 已通过。剩余 Rollup 注释警告与大 chunk 提示不阻断交付，可进入后续优化。
  - id: BLK-BACKEND-TEST-001
    source: backend mvn test
    severity: P0
    owner_agent: backend-agent
    status: resolved
    summary: 后端主代码 compile 通过，但测试代码与当前包结构脱节，mvn test 失败。
    evidence:
      - 测试引用 com.miniprogram.common.exception / common.result 等旧包
      - 测试引用不存在的 Member、PointsLog、MemberMapper、MemberServiceImpl
      - 多个 controller/service 集成测试无法 testCompile
    resolution: 已按当前包结构、DTO 和接口路径重建测试，mvn -q test 已通过。后续建议将 SpringBootTest 改为独立 test profile，减少对 dev 数据库的依赖。
