    evidence:
      - miniapp/services/member.js 调用 /api/v1/mp/member/info、/points-log、/coupons、/sign-in、/sign-in/status
      - miniapp/services/coupon.js 调用 /api/v1/mp/coupons、/claim、/my
      - backend/controller 未发现 member/coupon 小程序端入口
      - MemberPointsService、CouponService 仅有接口定义，未发现对应实现文件
    resolution: 已新增 MpMemberController、MpCouponController、MemberPointsServiceImpl、CouponServiceImpl，覆盖会员信息、签到、积分流水、可领券、领券、我的券接口。mvn -q -DskipTests compile 与 mvn -q test 均已通过。
