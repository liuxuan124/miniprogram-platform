task_id: TASK-BE-005
agent: backend-agent
status: 已提交回执
completed_work:
  - 创建 Spring Boot 3.2.5 + Java 17 Maven 项目骨架 (pom.xml)
  - 实现统一响应体 R<T>，支持 ok/fail/unauthorized/forbidden/notFound/badRequest 等工厂方法
  - 实现全局异常处理器 GlobalExceptionHandler，覆盖业务异常/参数校验/认证/权限/兜底异常
  - 实现 BusinessException 业务异常类 + ErrorCode 错误码枚举
  - 实现 BaseEntity 基础实体类（含 createTime/updateTime/createBy/updateBy/deleted 公共字段）
  - 实现 MyMetaObjectHandler 自动填充处理器（自动填充时间和操作人）
  - 实现 PageResult<T> 分页结果封装，支持从 MyBatis-Plus Page 对象直接转换
  - 集成 MyBatis-Plus 3.5.6，配置分页插件 + 乐观锁插件 + Mapper 扫描
  - 集成 Redis，配置 RedisTemplate（JSON 序列化）+ StringRedisTemplate
  - 实现 JWT 认证过滤器骨架（JwtTokenProvider + JwtAuthenticationFilter + SecurityUtils）
  - 配置 Spring Security，定义白名单路径，无状态 Session，JWT 过滤器链
  - 配置 Swagger/OpenAPI 文档（springdoc-openapi 2.5.0），含 JWT Bearer 认证按钮
  - 配置 CORS 跨域支持
  - 创建多环境配置文件（dev/test/prod），生产环境关闭 Swagger 和 SQL 日志
  - 创建 HealthController 健康检查接口
  - 创建基础 CRUD 封装（BaseService/BaseServiceImpl/BaseMapper）
  - 创建示例实体 User、DTO（LoginDTO/LoginVO/PageDTO）
  - 创建数据库初始化脚本 V1__init_schema.sql
  - 编写单元测试（RTest/JwtTokenProviderTest/MiniProgramApplicationTest）
