acceptance_criteria:
  - criteria: 表单模板CRUD（支持多种字段类型）
    status: done
    detail: FormTemplateController 提供 GET/POST/PUT/DELETE，fields JSON 支持 text/textarea/number/phone/email/date/time/image/radio/checkbox/select/district 字段类型
  - criteria: 表单提交与数据收集
    status: done
    detail: submitForm 接口根据 fields JSON 中的 type/required/validation 规则校验提交数据，支持必填、类型、正则、范围等校验
  - criteria: 预约服务CRUD（时间段管理）
    status: done
    detail: AppointmentServiceController + AppointmentSlotController 提供完整 CRUD，时段支持 max_capacity/booked_count 容量管理
  - criteria: 预约下单与状态管理
    status: done
    detail: 创建预约使用乐观锁保证容量不超卖，支持 pending/confirmed/cancelled/completed/no_show 状态流转，取消时自动释放容量
  - criteria: 小程序端表单提交/预约接口
    status: done
    detail: MpFormAppointmentController 提供 GET /mp/form-templates/{id}、POST /mp/form-templates/{id}/submit、GET /mp/appointment-services、GET /mp/appointment-services/{id}/slots、POST /mp/appointments、GET /mp/appointments、PUT /mp/appointments/{id}/cancel

notes: |
  - 表单字段校验：根据 fields JSON 中的 type/required/validation 规则校验提交数据，支持 number/phone/email/radio/checkbox/select 等类型校验，以及 min/max/pattern 自定义校验
  - 预约时段容量管理：使用 MyBatis-Plus 乐观锁（LambdaUpdateWrapper 条件更新）保证 booked_count 不超过 max_capacity
  - 预约取消时自动释放时段容量（booked_count - 1）
  - 预约单号格式：AP + yyyyMMdd + 6位随机数
  - 公开接口已配置 SecurityConfig permitAll：/api/v1/mp/form-templates/* 和 /api/v1/mp/appointment-services 及 /api/v1/mp/appointment-services/*/slots
