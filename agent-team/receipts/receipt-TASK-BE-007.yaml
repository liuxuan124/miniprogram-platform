acceptance_criteria:
  page_crud: "GET/POST/PUT/DELETE /api/v1/admin/pages — 页面CRUD，含分页/关键词/类型/状态筛选"
  draft_save: "PUT /api/v1/admin/pages/{id}/draft — 保存草稿，校验DSL schema_version=1.0，自动递增版本号"
  publish: "PUT /api/v1/admin/pages/{id}/publish — 发布页面，标记版本为已发布，页面状态→已发布"
  unpublish: "PUT /api/v1/admin/pages/{id}/unpublish — 下架页面，页面状态→已下架"
  version_list: "GET /api/v1/admin/pages/{id}/versions — 版本历史列表，按版本号降序"
  version_rollback: "PUT /api/v1/admin/pages/{id}/versions/rollback?version=N — 回滚到指定版本，创建新版本"
  template_list: "GET /api/v1/admin/page-templates — 模板列表，支持分类和关键词筛选"
  mp_page_config: "GET /api/v1/mp/pages?path=xxx — 小程序获取已发布页面DSL配置（公开接口）"
  dsl_validation: "DSL JSON校验：schema_version必须为1.0，格式错误返回300202"
  path_unique: "页面路径唯一性校验，重复返回300203"

api_contracts:
  - GET /api/v1/admin/pages — 页面列表（分页+筛选）
  - POST /api/v1/admin/pages — 创建页面
  - GET /api/v1/admin/pages/{id} — 页面详情（含当前版本DSL）
  - PUT /api/v1/admin/pages/{id} — 更新页面基本信息
  - DELETE /api/v1/admin/pages/{id} — 删除页面（已发布不可删）
  - PUT /api/v1/admin/pages/{id}/draft — 保存草稿
  - PUT /api/v1/admin/pages/{id}/publish — 发布页面
  - PUT /api/v1/admin/pages/{id}/unpublish — 下架页面
  - GET /api/v1/admin/pages/{id}/versions — 版本历史
  - PUT /api/v1/admin/pages/{id}/versions/rollback?version=N — 回滚版本
  - GET /api/v1/admin/page-templates — 模板列表
  - GET /api/v1/mp/pages?path=xxx — 小程序获取页面配置（公开）
  - GET /api/v1/mp/pages/{path} — 小程序获取页面配置（路径变量，公开）

database_tables:
  - mp_page — 页面主表（name, type, path, status, current_version, share_title, share_image, description）
  - mp_page_version — 页面版本表（page_id, version, dsl_content, status, publisher_id, published_at）
  - mp_page_template — 页面模板表（name, category, cover_image, description, dsl_content, use_count）

error_codes_aligned:
  - "300401: 页面不存在 (404)"
  - "300201: 页面状态错误-已发布/无版本 (422)"
  - "300402: 页面版本不存在 (404)"
  - "300202: DSL校验失败 (422)"
  - "300203: 页面路径重复 (409)"

notes: |
  - Page实体与MyBatis-Plus Page类名冲突，在ServiceImpl中使用全限定名com.baomidou.mybatisplus.extension.plugins.pagination.Page
  - PageServiceImpl与PageVersionServiceImpl存在循环依赖，通过@Lazy注解解决
  - DSL内容以JSON字符串存储在mp_page_version.dsl_content字段，保存时校验schema_version
  - 版本号自增：每次保存草稿自动+1，回滚时基于目标版本DSL创建新版本
  - 回滚机制：将目标版本标记为"已回滚"(status=2)，基于其DSL创建新草稿版本
  - 小程序接口 /api/v1/mp/** 配置为permitAll公开访问，无需JWT认证
  - GlobalExceptionHandler增强：BusinessException根据错误码模式映射HTTP状态码（xx04xx→404, xx02xx→422, xx05xx→409）
  - 预存在的编译错误（AdminUserServiceImpl, RoleServiceImpl, UserController, JwtTokenProvider, MpAuthController）属于TASK-BE-005/006，不在本任务范围内
