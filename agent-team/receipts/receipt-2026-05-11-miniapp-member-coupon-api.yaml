summary: 小程序会员、签到、积分、优惠券后端接口已补齐，可进入微信开发者工具联调。
implemented:
  - 新增 /api/v1/mp/member/info，返回会员信息、积分、等级、签到状态、未使用优惠券数量。
  - 新增 /api/v1/mp/member/sign-in，支持每日签到、连续签到天数、积分流水。
  - 新增 /api/v1/mp/member/sign-in/status，返回 todaySigned 与 streak。
  - 新增 /api/v1/mp/member/points-log，返回当前用户积分流水。
  - 新增 /api/v1/mp/coupons，返回可领取优惠券。
  - 新增 /api/v1/mp/coupons/{id}/claim，支持领取优惠券、限领校验、库存校验。
  - 新增 /api/v1/mp/coupons/my，返回当前用户优惠券。
