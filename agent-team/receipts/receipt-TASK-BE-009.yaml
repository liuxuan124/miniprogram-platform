acceptance_criteria:
  product_category_crud: "商品分类CRUD（树形结构）- 已实现，含树形查询、创建、更新、删除（含子分类校验）"
  product_crud: "商品CRUD（含SKU、库存、价格）- 已实现，含SKU管理、上下架、库存管理"
  cart_management: "购物车管理 - 已实现，含添加/更新/删除/列表，同商品同SKU自动合并数量"
  order_state_machine: "订单状态机严格遵循契约 - 已实现，STATE_TRANSITIONS Map定义合法流转路径"
  wx_pay_integration: "微信支付V3集成 - 已实现统一下单/回调验签(AES-256-GCM解密)/查询"
  refund_flow: "退款流程 - 已实现申请→审批→执行(微信退款API)，拒绝时订单回退到paid"
  mp_apis: "小程序端商品/购物车/订单接口 - 已实现，商品列表/详情公开，其他需认证"

order_state_machine_transitions:
  - from: pending_payment
    to: [paid, closed]
  - from: paid
    to: [shipped, refunding]
  - from: shipped
    to: [completed]
  - from: completed
    to: [refunding]
  - from: refunding
    to: [refunded, paid]

api_endpoints:
  admin:
    - "GET/POST /api/v1/admin/product-categories"
    - "PUT/DELETE /api/v1/admin/product-categories/{id}"
    - "GET/POST /api/v1/admin/products"
    - "GET/PUT/DELETE /api/v1/admin/products/{id}"
    - "PUT /api/v1/admin/products/{id}/on-sale"
    - "PUT /api/v1/admin/products/{id}/off-sale"
    - "GET /api/v1/admin/orders"
    - "GET /api/v1/admin/orders/{id}"
    - "PUT /api/v1/admin/orders/{id}/ship"
    - "PUT /api/v1/admin/orders/{id}/refund-approve"
    - "GET /api/v1/admin/refunds"
  mp:
    - "GET /api/v1/mp/products (公开)"
    - "GET /api/v1/mp/products/{id} (公开)"
    - "GET/POST /api/v1/mp/cart"
    - "PUT/DELETE /api/v1/mp/cart/{id}"
    - "POST /api/v1/mp/orders"
    - "GET /api/v1/mp/orders"
    - "GET /api/v1/mp/orders/{id}"
    - "POST /api/v1/mp/orders/{id}/pay"
    - "POST /api/v1/mp/orders/{id}/cancel"
    - "POST /api/v1/mp/orders/{id}/confirm"
    - "POST /api/v1/mp/orders/{id}/refund"
    - "POST /api/v1/mp/payments/wx-notify (公开)"

