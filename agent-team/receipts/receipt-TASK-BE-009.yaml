notes: |
  1. 订单状态机严格遵循契约，使用STATE_TRANSITIONS Map定义合法流转，每次状态变更前校验
  2. 微信支付采用V3 API，支持RSA签名、AES-256-GCM回调解密
  3. 购物车同商品同SKU自动合并数量，使用UNIQUE KEY (user_id, product_id, sku_id)约束
  4. 创建订单时原子性扣减库存（商品+SKU），取消订单时恢复库存
  5. 退款流程：用户申请→管理员审批→同意则调用微信退款API→拒绝则订单回退到paid
  6. 微信支付配置通过环境变量注入，application.yml中提供默认值
