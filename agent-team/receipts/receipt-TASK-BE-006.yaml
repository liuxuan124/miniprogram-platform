acceptance_criteria:
  wx_login: "POST /api/v1/mp/auth/login — wx.login code换token，自动注册/更新用户"
  admin_login: "POST /api/v1/admin/auth/login — username/password换JWT token"
  rbac: "JwtAuthenticationFilter从DB加载角色+权限点，Controller用@PreAuthorize拦截"
  admin_crud: "GET/POST/PUT/DELETE /api/v1/admin/admin-users — 管理员CRUD"
  token_refresh: "POST /api/v1/admin/auth/refresh — refreshToken换新accessToken"

api_contracts:
  - POST /api/v1/admin/auth/login — 管理员登录（公开）
  - POST /api/v1/admin/auth/refresh — 刷新Token（登录）
  - POST /api/v1/admin/auth/logout — 退出登录（登录）
  - GET /api/v1/admin/auth/profile — 获取当前用户信息（登录）
  - PUT /api/v1/admin/auth/password — 修改密码（登录）
  - POST /api/v1/mp/auth/login — 小程序微信登录（公开）
  - POST /api/v1/mp/auth/phone — 小程序获取手机号（登录）
  - GET /api/v1/admin/admin-users — 管理员列表（super_admin）
  - POST /api/v1/admin/admin-users — 创建管理员（super_admin）
  - PUT /api/v1/admin/admin-users/{id} — 更新管理员（super_admin）
  - DELETE /api/v1/admin/admin-users/{id} — 删除管理员（super_admin）
  - GET /api/v1/admin/roles — 角色列表（super_admin）
  - POST /api/v1/admin/roles — 创建角色（super_admin）
  - PUT /api/v1/admin/roles/{id} — 更新角色（super_admin）
  - PUT /api/v1/admin/roles/{id}/permissions — 设置角色权限（super_admin）
  - GET /api/v1/admin/permissions — 权限树（super_admin）
  - GET /api/v1/admin/users — 小程序用户列表（登录）
  - GET /api/v1/admin/users/{id} — 用户详情（登录）

database_tables:
  - mp_admin_user — 后台管理员
  - mp_role — 角色（预设: super_admin, content_ops, biz_ops, service_staff）
  - mp_permission — 权限点（12个模块，含菜单+按钮级权限）
  - mp_role_permission — 角色权限关联
  - mp_user — 小程序用户

error_codes_aligned:
  - "110101: 未登录 (401)"
  - "110102: Token已过期 (401)"
  - "110103: 账号已禁用 (403)"
  - "110201: 微信登录失败 (401)"
  - "200301: 无操作权限 (403)"
  - "200401: 管理员不存在 (404)"
  - "200501: 用户名已存在 (409)"

notes: |
  - 默认管理员账号 admin/admin123 由 DataInitializer 在首次启动时创建
  - RBAC 通过 @PreAuthorize("hasRole('super_admin')") 注解实现
  - JwtAuthenticationFilter 在每次请求时从数据库加载用户角色和权限点
  - 微信小程序配置通过环境变量 WX_MINIAPP_APPID / WX_MINIAPP_SECRET 注入
  - V2__auth_tables.sql 包含完整的角色、权限点和角色权限关联初始数据
